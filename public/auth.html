<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HaloProfile — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="/js/i18n.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-rose-50 via-orange-50 to-amber-50 flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8 relative">
      <a href="/" class="inline-flex items-center gap-2">
        <span class="text-3xl">✨</span>
        <span class="text-2xl font-bold bg-gradient-to-r from-rose-500 to-orange-500 bg-clip-text text-transparent">HaloProfile</span>
      </a>
      <p class="text-gray-500 text-sm mt-2">Your AI-powered dating photos</p>
      <a id="lang-toggle" class="absolute top-0 right-0 text-sm font-medium text-gray-400 hover:text-gray-600 transition-colors">🇫🇷 FR</a>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl shadow-rose-100 overflow-hidden">

      <!-- Tabs -->
      <div class="flex border-b border-gray-100">
        <button id="tab-login"
          class="flex-1 py-4 text-sm font-semibold text-rose-600 border-b-2 border-rose-500 transition-all"
          onclick="switchTab('login')">
          Log In
        </button>
        <button id="tab-signup"
          class="flex-1 py-4 text-sm font-semibold text-gray-400 border-b-2 border-transparent hover:text-gray-600 transition-all"
          onclick="switchTab('signup')">
          Sign Up
        </button>
      </div>

      <div class="p-8">

        <!-- Error message -->
        <div id="error-msg" class="hidden mb-4 px-4 py-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg"></div>

        <!-- Success message -->
        <div id="success-msg" class="hidden mb-4 px-4 py-3 bg-green-50 border border-green-200 text-green-700 text-sm rounded-lg"></div>

        <!-- Google OAuth -->
        <button id="btn-google" onclick="handleGoogle()"
          class="w-full flex items-center justify-center gap-3 py-3 px-4 border border-gray-200 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-50 hover:border-gray-300 transition-all mb-5">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
          Continue with Google
        </button>

        <!-- Divider -->
        <div class="flex items-center gap-3 mb-5">
          <div class="flex-1 h-px bg-gray-100"></div>
          <span class="text-xs text-gray-400 font-medium">or</span>
          <div class="flex-1 h-px bg-gray-100"></div>
        </div>

        <!-- Email field -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
          <input id="email" type="email" placeholder="you@example.com" autocomplete="email"
            class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-rose-400 focus:border-transparent transition-all" />
        </div>

        <!-- Password field -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"
            class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-rose-400 focus:border-transparent transition-all" />
        </div>

        <!-- Submit button -->
        <button id="btn-submit" onclick="handleSubmit()"
          class="w-full py-3 px-4 bg-gradient-to-r from-rose-500 to-orange-500 text-white text-sm font-semibold rounded-xl hover:from-rose-600 hover:to-orange-600 active:scale-95 transition-all shadow-md shadow-rose-200">
          Log In
        </button>

        <!-- Switch hint -->
        <p id="switch-hint" class="text-center text-sm text-gray-500 mt-4">
          Don't have an account?
          <button onclick="switchTab('signup')" class="text-rose-500 font-semibold hover:underline">Sign up free</button>
        </p>

      </div>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">
      By continuing, you agree to our Terms of Service & Privacy Policy.
    </p>
  </div>

  <script type="module">
    import { login, signup, loginWithGoogle, getToken } from "/js/auth.js";
    document.getElementById('lang-toggle').addEventListener('click', () => {
      window.location.href = '/fr/auth.html';
    });

    let currentTab = "login";

    window.switchTab = function (tab) {
      currentTab = tab;
      clearMessages();

      const loginTab = document.getElementById("tab-login");
      const signupTab = document.getElementById("tab-signup");
      const submitBtn = document.getElementById("btn-submit");
      const hint = document.getElementById("switch-hint");

      if (tab === "login") {
        loginTab.classList.add("text-rose-600", "border-rose-500");
        loginTab.classList.remove("text-gray-400", "border-transparent");
        signupTab.classList.remove("text-rose-600", "border-rose-500");
        signupTab.classList.add("text-gray-400", "border-transparent");
        submitBtn.textContent = "Log In";
        hint.innerHTML = `Don't have an account? <button onclick="switchTab('signup')" class="text-rose-500 font-semibold hover:underline">Sign up free</button>`;
      } else {
        signupTab.classList.add("text-rose-600", "border-rose-500");
        signupTab.classList.remove("text-gray-400", "border-transparent");
        loginTab.classList.remove("text-rose-600", "border-rose-500");
        loginTab.classList.add("text-gray-400", "border-transparent");
        submitBtn.textContent = "Create Account";
        hint.innerHTML = `Already have an account? <button onclick="switchTab('login')" class="text-rose-500 font-semibold hover:underline">Log in</button>`;
      }
    };

    window.handleSubmit = async function () {
      clearMessages();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const btn = document.getElementById("btn-submit");

      if (!email || !password) {
        showError("Please enter your email and password.");
        return;
      }

      btn.disabled = true;
      btn.textContent = currentTab === "login" ? "Logging in…" : "Creating account…";

      try {
        if (currentTab === "login") {
          await login(email, password);
          window.location.href = "/upload.html";
        } else {
          const data = await signup(email, password);
          // Send welcome email (non-blocking)
          const isFrench = window.location.pathname.startsWith("/fr/");
          const locale = isFrench ? "fr" : "en";
          try {
            const token = await getToken();
            if (token) {
              fetch("/api/auth/welcome", {
                method: "POST",
                headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
                body: JSON.stringify({ locale }),
              }).catch(() => {});
            }
          } catch (e) { /* non-blocking */ }
          if (data.session) {
            window.location.href = isFrench ? "/fr/upload.html" : "/upload.html";
          } else {
            showSuccess("Check your email to confirm your account, then log in.");
            switchTab("login");
          }
        }
      } catch (err) {
        showError(err.message || "Something went wrong. Please try again.");
      } finally {
        btn.disabled = false;
        btn.textContent = currentTab === "login" ? "Log In" : "Create Account";
      }
    };

    window.handleGoogle = async function () {
      clearMessages();
      try {
        await loginWithGoogle();
      } catch (err) {
        showError(err.message || "Google sign-in failed.");
      }
    };

    function showError(msg) {
      const el = document.getElementById("error-msg");
      el.textContent = msg;
      el.classList.remove("hidden");
    }

    function showSuccess(msg) {
      const el = document.getElementById("success-msg");
      el.textContent = msg;
      el.classList.remove("hidden");
    }

    function clearMessages() {
      document.getElementById("error-msg").classList.add("hidden");
      document.getElementById("success-msg").classList.add("hidden");
    }

    // Allow Enter key to submit
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleSubmit();
    });
  </script>
</body>
</html>
