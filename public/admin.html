<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — HaloProfile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-gray-950 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="text-4xl mb-2">⚙️</div>
      <h1 class="text-2xl font-bold text-white">Admin Panel</h1>
      <p class="text-gray-400 text-sm mt-1">Enter your password to continue</p>
    </div>

    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6">
      <div id="error-msg" class="hidden mb-4 px-4 py-3 bg-red-900/50 border border-red-800 text-red-300 text-sm rounded-lg"></div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
        <input id="password" type="password" placeholder="Enter admin password"
          class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl text-sm text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-rose-500 focus:border-transparent transition-all" />
      </div>

      <button id="btn-login" onclick="handleLogin()"
        class="w-full py-3 px-4 bg-rose-600 text-white text-sm font-semibold rounded-xl hover:bg-rose-700 active:scale-95 transition-all shadow-md">
        Sign In
      </button>
    </div>

    <p class="text-center text-xs text-gray-600 mt-6">
      <a href="/" class="hover:text-gray-400 transition-colors">← Back to site</a>
    </p>
  </div>

  <script type="module">
    import { adminFetch, loginAdmin, getAdminToken, ADMIN_API } from "/js/admin.js";

    // If already logged in, redirect to dashboard
    if (getAdminToken()) {
      window.location.href = "/admin/dashboard.html";
    }

    window.handleLogin = async function () {
      const password = document.getElementById("password").value.trim();
      const btn = document.getElementById("btn-login");
      const errorEl = document.getElementById("error-msg");

      errorEl.classList.add("hidden");

      if (!password) {
        errorEl.textContent = "Please enter the admin password.";
        errorEl.classList.remove("hidden");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Signing in…";

      try {
        const data = await loginAdmin(password);
        if (data.token) {
          window.location.href = "/admin/dashboard.html";
        } else {
          throw new Error("No token received");
        }
      } catch (err) {
        errorEl.textContent = err.message || "Invalid password.";
        errorEl.classList.remove("hidden");
        btn.disabled = false;
        btn.textContent = "Sign In";
      }
    };

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleLogin();
    });
  </script>
</body>
</html>
